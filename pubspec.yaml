name: lorekeeper
description: "A premium reading companion built with Flutter."
publish_to: 'none'

version: 1.0.0+17

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  hive: ^2.2.3
  hive_flutter: ^1.1.0


  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  http: ^1.5.0
  file_picker: ^11.0.2
  epub_plus: ^5.0.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.7.0
  freezed: ^3.2.3
  json_serializable: ^6.11.1

  flutter_native_splash: ^2.4.6
  

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/covers/

flutter_native_splash:
  color: "#0B1020"
  image: assets/images/lorekeeper_icon.png

  android: true
  ios: true
  web: false

  android_12:
    color: "#0B1020"
    image: assets/images/lorekeeper_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/lorekeeper_icon.png
  remove_alpha_ios: true
